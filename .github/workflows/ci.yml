name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            mosaic-cli/target
          key: cargo-ci-${{ hashFiles('src-tauri/Cargo.lock', 'mosaic-cli/Cargo.lock') }}
          restore-keys: cargo-ci-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf ffmpeg mediainfo

      - name: Clippy (GUI-only, default features)
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Clippy (all targets, cli + test-api)
        working-directory: src-tauri
        run: cargo clippy --all-targets --features test-api,cli -- -D warnings

      - name: Clippy (mosaic-cli)
        working-directory: mosaic-cli
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        working-directory: src-tauri
        run: cargo test --features test-api

      - name: CLI integration tests
        working-directory: mosaic-cli
        run: cargo test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build:web

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck install.sh
        run: shellcheck site/install.sh
