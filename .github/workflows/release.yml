name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: ""
          - os: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-release-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-release-${{ matrix.os }}-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mosaic ${{ github.ref_name }}"
          releaseBody: |
            ## What's New

            ### Added

            - **HDR auto-tonemapping** — HDR10, HLG, and Dolby Vision thumbnails are automatically tonemapped to SDR across all output types (requires ffmpeg with libzimg)
            - **MediaInfo modal** — click the file icon in any queue row to view raw `mediainfo` output with copy-to-clipboard (requires [MediaInfo CLI](https://mediaarea.net/en/MediaInfo) installed separately)
            - **Expanded format support** — 44 recognized video container types (was 12), including broadcast (MXF, R3D), camcorder (DV, WTV), and legacy formats

            ### Fixed

            - Clip extraction (preview reels, animated sheets) no longer fails on transport stream containers (.ts, .m2ts)
            - HDR tonemapping correctly specifies input colorspace to avoid zscale errors
            - Dolby Vision Profile 5 streams with SDR-compatible base layers are left untouched

            ### Changed

            - Upgraded thiserror 1→2 and which 6→8
            - Queue row click-to-reveal narrowed to filename only

            ### Requirements

            **[ffmpeg](https://ffmpeg.org/) must be installed separately.** The app checks for `ffmpeg` and `ffprobe` on your PATH at startup. [MediaInfo CLI](https://mediaarea.net/en/MediaInfo) is optional — needed only for the info modal.

            ### Notes

            Builds are **unsigned**. macOS users: right-click → Open to bypass Gatekeeper. Windows users: click through the SmartScreen warning.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}
