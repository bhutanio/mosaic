name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: ""
          - os: windows-11-arm
            rust-targets: aarch64-pc-windows-msvc
            tauri-args: --target aarch64-pc-windows-msvc
          - os: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-release-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-release-${{ matrix.os }}-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Import Apple Developer certificate (macOS only)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import $RUNNER_TEMP/certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm $RUNNER_TEMP/certificate.p12

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (only used on macos-latest runner)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # Tauri updater signing (all platforms)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mosaic ${{ github.ref_name }}"
          releaseBody: |
            ## What's New

            ### Added

            - **Auto-update** — app checks for new releases on startup and offers one-click install. Updates are cryptographically signed and verified on device.
            - **macOS code signing + notarization** — Gatekeeper-trusted on first open; no right-click → Open required.
            - **Windows ARM64 builds** — native aarch64 binaries for Snapdragon-based Windows devices, alongside the existing x64 build.
            - **Version in title bar** — window title shows the current version (e.g. `Mosaic 0.1.2`).

            ### Reminder: optional [MediaInfo CLI](https://mediaarea.net/en/MediaInfo) integration

            Click the info icon on any queue row to view full container / codec / HDR metadata. Install with `brew install mediainfo` (macOS), `winget install MediaArea.MediaInfo.CLI` (Windows), or `apt install mediainfo` (Linux). The rest of the app works without it.

            ### Fixed

            - MediaInfo lookup on macOS now falls back to `/opt/homebrew/bin` and `/usr/local/bin` when `PATH` is empty (apps launched from Finder/Dock don't inherit shell `PATH`).

            ### Requirements

            **[ffmpeg](https://ffmpeg.org/) must be installed separately.** The app checks for `ffmpeg` and `ffprobe` on your PATH at startup. [MediaInfo CLI](https://mediaarea.net/en/MediaInfo) is optional — needed only for the info modal.

            ### Notes

            **Users on v0.1.1 and earlier:** download this version manually — the auto-updater was added in v0.1.2, so older versions have no way to know about it. From v0.1.2 → future versions, updates install automatically.

            **Windows:** builds are not yet code-signed. SmartScreen may warn on first install and on each update — click "More info" → "Run anyway".
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}
