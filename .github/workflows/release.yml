name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
            cli-name: macos-universal
            cli-lipo: "true"
          - os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: ""
            cli-name: windows-x86_64
            cli-target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            rust-targets: aarch64-pc-windows-msvc
            tauri-args: --target aarch64-pc-windows-msvc
            cli-name: windows-aarch64
            cli-target: aarch64-pc-windows-msvc
          - os: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: ""
            cli-name: linux-x86_64
            cli-target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-release-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-release-${{ matrix.os }}-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Import Apple Developer certificate (macOS only)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import $RUNNER_TEMP/certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm $RUNNER_TEMP/certificate.p12

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (only used on macos-latest runner)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # Tauri updater signing (all platforms)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mosaic ${{ github.ref_name }}"
          releaseBody: |
            ## What's New

            ### Added

            - **Richer contact-sheet headers via MediaInfo** — headers now show container title, video bit depth, HDR format (Dolby Vision / HDR10 / HLG), commercial audio codec name (e.g. `DTS-HD MA`, `Dolby Atmos`), channel layout (`5.1`, `7.1`), and language tag. Header is now one section per line so nothing clips on narrow grids.
            - **MediaInfo CLI promoted to a required prerequisite** — same tools-missing state as ffmpeg if absent. Enables the enrichment above and powers the existing per-file metadata viewer.

            ### Fixed

            - **Anamorphic sources (phone portrait, non-square SAR)** now render with the correct aspect across every output type. Previously, a 9:16 phone clip encoded in a 1080×1080 frame came out squashed-square in contact sheets, reels, and screenshots. Mosaic now uses the displayed square-pixel dimensions (applying SAR and Display Matrix rotation) for both layout and scaling.
            - **Rotated sources (±90° / ±270° Display Matrix)** — portrait orientation is preserved end-to-end instead of silently using encoded landscape dims.
            - **3D Blu-ray / MVC inputs** — contact sheets no longer come out as zero-dim squares; the usable base-layer stream is now preferred over the dependent-enhancement view that ffprobe lists first.

            ### Requirements

            **[ffmpeg](https://ffmpeg.org/) and [MediaInfo CLI](https://mediaarea.net/en/MediaInfo) must both be installed separately.** The app checks for `ffmpeg`, `ffprobe`, and `mediainfo` on your `PATH` at startup. Install via `brew install ffmpeg-full mediainfo` (macOS), `winget install ffmpeg MediaArea.MediaInfo.CLI` (Windows), or `apt install ffmpeg mediainfo` (Linux).

            **Upgrading from v0.1.2?** Auto-update handles it. **Upgrading from v0.1.1 or earlier?** Download manually — the auto-updater shipped in v0.1.2, so older versions have no way to know this release exists.

            ### Notes

            **Windows:** builds are not yet code-signed. SmartScreen may warn on first install and on each update — click "More info" → "Run anyway".
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}

      - name: Build mosaic-cli (lipo universal, macOS only)
        if: matrix.cli-lipo == 'true'
        working-directory: src-tauri
        run: |
          cargo build --release --features cli --bin mosaic-cli --target aarch64-apple-darwin
          cargo build --release --features cli --bin mosaic-cli --target x86_64-apple-darwin
          mkdir -p target/universal-apple-darwin/release
          lipo -create -output target/universal-apple-darwin/release/mosaic-cli \
            target/aarch64-apple-darwin/release/mosaic-cli \
            target/x86_64-apple-darwin/release/mosaic-cli
          strip target/universal-apple-darwin/release/mosaic-cli

      - name: Build mosaic-cli (single target)
        if: matrix.cli-lipo != 'true'
        working-directory: src-tauri
        run: cargo build --release --features cli --bin mosaic-cli --target ${{ matrix.cli-target }}

      - name: Codesign + notarize mosaic-cli (macOS)
        if: matrix.cli-lipo == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          bin="src-tauri/target/universal-apple-darwin/release/mosaic-cli"
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" "$bin"
          codesign --verify --verbose "$bin"
          # Notarize via zip — notarytool requires a container, not a raw Mach-O.
          ditto -c -k --keepParent "$bin" mosaic-cli-notarize.zip
          xcrun notarytool submit mosaic-cli-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm mosaic-cli-notarize.zip

      - name: Strip CLI (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: strip src-tauri/target/${{ matrix.cli-target }}/release/mosaic-cli

      - name: Prepare CLI artifact
        shell: bash
        run: |
          if [ "${{ matrix.cli-lipo }}" = "true" ]; then
            src="src-tauri/target/universal-apple-darwin/release/mosaic-cli"
            ext=""
          elif [[ "${{ matrix.os }}" == windows* ]]; then
            src="src-tauri/target/${{ matrix.cli-target }}/release/mosaic-cli.exe"
            ext=".exe"
          else
            src="src-tauri/target/${{ matrix.cli-target }}/release/mosaic-cli"
            ext=""
          fi
          dst="mosaic-cli-${{ matrix.cli-name }}${ext}"
          cp "$src" "$dst"
          echo "CLI_ARTIFACT=$dst" >> "$GITHUB_ENV"

      - name: Upload CLI to release draft
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.CLI_ARTIFACT }}
          tag_name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: true
