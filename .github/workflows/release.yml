name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
            cli-name: macos-universal
            cli-lipo: "true"
          - os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: ""
            cli-name: windows-x86_64
            cli-target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            rust-targets: aarch64-pc-windows-msvc
            tauri-args: --target aarch64-pc-windows-msvc
            cli-name: windows-aarch64
            cli-target: aarch64-pc-windows-msvc
          - os: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: ""
            cli-name: linux-x86_64
            cli-target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-release-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-release-${{ matrix.os }}-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Import Apple Developer certificate (macOS only)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import $RUNNER_TEMP/certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm $RUNNER_TEMP/certificate.p12

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (only used on macos-latest runner)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # Tauri updater signing (all platforms)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mosaic ${{ github.ref_name }}"
          releaseBody: |
            ## What's New

            ### Added

            - **Command-line interface (`mosaic-cli`)** — every pipeline now available as a subcommand (`screenshots`, `sheet`, `reel`, `animated-sheet`, `probe`). Batch-friendly for scripts and headless servers: stdout is paths-only so it pipes cleanly into `xargs`; stderr carries progress and the final `done · failed · cancelled` summary. Ctrl-C cancels gracefully; a second Ctrl-C hard-exits. Per-user config at `~/.mosaic-cli.toml` is auto-created on first run with every default commented out — uncomment to override (env `$MOSAIC_CLI_CONFIG` points at a different file). CLI flags always win over config. Signed + notarized macOS universal, plus unsigned Windows x86_64/aarch64 and Linux x86_64 binaries ship alongside the GUI installers below.
            - **Multi-output history per queue row** — after a shots + sheet + reel run in a single Generate pass, the row now remembers all three outputs. Clicking reveals the shared parent folder so every file is visible at once; the hover tooltip lists each filename. Previously only the last pass's output was retained.

            ### Fixed

            - **Filename-suffix default mismatch** — clearing the screenshots suffix field used to restore `_screenshot_` on the UI while the backend actually wrote `_screens_`, so the displayed default didn't match the file on disk. UI defaults now read straight from the backend constants and stay in sync.
            - **Silent probe failures in the queue** — rows whose probe failed used to show an empty metadata cell permanently. They now show `⚠ probe failed` with the underlying error as a hover tooltip, so you can see which files were actually skipped.
            - **Unreadable auto-update dialog** — the native update prompt no longer dumps the full GitHub release-notes markdown (which could stretch the dialog to absurd heights). It now shows just the version and install question; full notes remain one click away on the release page.

            ### Changed

            - **Faster multi-pass Generate** — the backend now reuses the probe the frontend already performed on queue-add instead of re-probing each file once per pass. A shots + sheet + reel run on 10 files drops from 40 redundant ffprobe + mediainfo invocations to zero.

            ### Requirements

            **[ffmpeg](https://ffmpeg.org/) and [MediaInfo CLI](https://mediaarea.net/en/MediaInfo) must both be installed separately.** The app checks for `ffmpeg`, `ffprobe`, and `mediainfo` on your `PATH` at startup. Install via `brew install ffmpeg-full mediainfo` (macOS), `winget install Gyan.FFmpeg MediaArea.MediaInfo.CLI` (Windows), or `apt install ffmpeg mediainfo` (Linux).

            **Upgrading from v0.1.3?** Auto-update handles it. **Upgrading from v0.1.1 or earlier?** Download manually — the auto-updater shipped in v0.1.2, so older versions have no way to know this release exists.

            ### Notes

            **Windows:** GUI and CLI builds are not yet code-signed. SmartScreen may warn on first install and on each update — click "More info" → "Run anyway". The macOS CLI binary **is** signed with the same Developer ID as the GUI and notarized, so Gatekeeper accepts it on first run.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}

      - name: Build mosaic-cli (lipo universal, macOS only)
        if: matrix.cli-lipo == 'true'
        working-directory: mosaic-cli
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p target/universal-apple-darwin/release
          lipo -create -output target/universal-apple-darwin/release/mosaic-cli \
            target/aarch64-apple-darwin/release/mosaic-cli \
            target/x86_64-apple-darwin/release/mosaic-cli
          strip target/universal-apple-darwin/release/mosaic-cli

      - name: Build mosaic-cli (single target)
        if: matrix.cli-lipo != 'true'
        working-directory: mosaic-cli
        run: cargo build --release --target ${{ matrix.cli-target }}

      - name: Codesign + notarize mosaic-cli (macOS)
        if: matrix.cli-lipo == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          bin="mosaic-cli/target/universal-apple-darwin/release/mosaic-cli"
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" "$bin"
          codesign --verify --verbose "$bin"
          # Notarize via zip — notarytool requires a container, not a raw Mach-O.
          ditto -c -k --keepParent "$bin" mosaic-cli-notarize.zip
          xcrun notarytool submit mosaic-cli-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm mosaic-cli-notarize.zip

      - name: Strip CLI (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: strip mosaic-cli/target/${{ matrix.cli-target }}/release/mosaic-cli

      - name: Prepare CLI artifact
        shell: bash
        run: |
          if [ "${{ matrix.cli-lipo }}" = "true" ]; then
            src="mosaic-cli/target/universal-apple-darwin/release/mosaic-cli"
            ext=""
          elif [[ "${{ matrix.os }}" == windows* ]]; then
            src="mosaic-cli/target/${{ matrix.cli-target }}/release/mosaic-cli.exe"
            ext=".exe"
          else
            src="mosaic-cli/target/${{ matrix.cli-target }}/release/mosaic-cli"
            ext=""
          fi
          dst="mosaic-cli-${{ matrix.cli-name }}${ext}"
          cp "$src" "$dst"
          echo "CLI_ARTIFACT=$dst" >> "$GITHUB_ENV"

      - name: Upload CLI to release draft
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.CLI_ARTIFACT }}
          tag_name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: true
