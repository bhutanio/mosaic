name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
            cli-name: macos-universal
            cli-lipo: "true"
          - os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: ""
            cli-name: windows-x86_64
            cli-target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            rust-targets: aarch64-pc-windows-msvc
            tauri-args: --target aarch64-pc-windows-msvc
            cli-name: windows-aarch64
            cli-target: aarch64-pc-windows-msvc
          - os: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: ""
            cli-name: linux-x86_64
            cli-target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-release-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-release-${{ matrix.os }}-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Import Apple Developer certificate (macOS only)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import $RUNNER_TEMP/certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm $RUNNER_TEMP/certificate.p12

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (only used on macos-latest runner)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # Tauri updater signing (all platforms)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mosaic ${{ github.ref_name }}"
          releaseBody: |
            ## What's New

            v0.1.5 focuses on making `mosaic-cli` pleasant to install and use — no package manager required. The desktop GUI is unchanged in this release.

            ### Added

            - **One-liner install scripts for `mosaic-cli`** served via GitHub Pages. Detect your OS and architecture, resolve this release automatically, download + SHA256-verify the matching binary, install to a user-scoped directory, and print PATH + shell-completion hints. No root, no sudo, no package manager.

              ```sh
              # macOS / Linux
              curl -LsSf https://mosaicvideo.github.io/mosaic/install.sh | sh

              # Windows (PowerShell)
              irm https://mosaicvideo.github.io/mosaic/install.ps1 | iex
              ```

              Override the install directory with `MOSAIC_INSTALL_DIR` (Unix) or `-InstallDir` (Windows). To upgrade in the future, just re-run the same one-liner — the scripts always fetch the latest release.

            - **`SHA256SUMS` release artifact** covering every `mosaic-cli-*` binary in this release. Aggregated in CI from per-artifact `.sha256` files uploaded by each matrix runner. Verify downloads manually with `shasum -a 256 -c SHA256SUMS`; the install scripts do this automatically.

            - **`mosaic-cli completions <shell>`** — emits a ready-to-install shell-completion script to stdout. Supports bash, zsh, fish, powershell, and elvish. Generated on the fly via `clap_complete` — always in sync with the installed binary.

            - **`mosaic-cli manpage`** — emits a roff man page. Install with `mosaic-cli manpage > ~/.local/share/man/man1/mosaic-cli.1`, then `man mosaic-cli` works.

            - **Dedicated CLI reference page** at <https://mosaicvideo.github.io/mosaic/cli.html>. Covers install (all platforms), subcommand flag reference with defaults, config file format, shell-completion setup per shell, man page, upgrading, uninstalling, and troubleshooting. Linked from the top nav on every site page; the old `guide.html#cli` section is now a short pointer.

            ### Fixed

            - **Stale `cargo install` snippet in the guide and README.** The build-from-source instruction pointed at `cd src-tauri && cargo install --path . --bin mosaic-cli --features cli` — wrong since the CLI moved to a sibling crate in v0.1.4. Both the site guide and README now point at the new `cli.html` page.

            ### Requirements

            **[ffmpeg](https://ffmpeg.org/) and [MediaInfo CLI](https://mediaarea.net/en/MediaInfo) must both be installed separately.** The app and the CLI check for `ffmpeg`, `ffprobe`, and `mediainfo` on your `PATH` at startup. Install via `brew install ffmpeg-full mediainfo` (macOS), `winget install Gyan.FFmpeg MediaArea.MediaInfo.CLI` (Windows), or `apt install ffmpeg mediainfo` (Linux).

            **Upgrading from v0.1.4?** Auto-update handles the GUI. For the CLI, re-run the install one-liner above. **Upgrading from v0.1.1 or earlier?** Download the GUI manually — the auto-updater shipped in v0.1.2, so older versions have no way to know this release exists.

            ### Notes

            **Windows:** GUI and CLI builds are not yet code-signed. SmartScreen may warn on first install and on each update — click "More info" → "Run anyway". The macOS CLI binary **is** signed with the same Developer ID as the GUI and notarized, so Gatekeeper accepts it on first run.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}

      - name: Build mosaic-cli (lipo universal, macOS only)
        if: matrix.cli-lipo == 'true'
        working-directory: mosaic-cli
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p target/universal-apple-darwin/release
          lipo -create -output target/universal-apple-darwin/release/mosaic-cli \
            target/aarch64-apple-darwin/release/mosaic-cli \
            target/x86_64-apple-darwin/release/mosaic-cli
          strip target/universal-apple-darwin/release/mosaic-cli

      - name: Build mosaic-cli (single target)
        if: matrix.cli-lipo != 'true'
        working-directory: mosaic-cli
        run: cargo build --release --target ${{ matrix.cli-target }}

      - name: Codesign + notarize mosaic-cli (macOS)
        if: matrix.cli-lipo == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          bin="mosaic-cli/target/universal-apple-darwin/release/mosaic-cli"
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" "$bin"
          codesign --verify --verbose "$bin"
          # Notarize via zip — notarytool requires a container, not a raw Mach-O.
          ditto -c -k --keepParent "$bin" mosaic-cli-notarize.zip
          xcrun notarytool submit mosaic-cli-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm mosaic-cli-notarize.zip

      - name: Strip CLI (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: strip mosaic-cli/target/${{ matrix.cli-target }}/release/mosaic-cli

      - name: Prepare CLI artifact
        shell: bash
        run: |
          if [ "${{ matrix.cli-lipo }}" = "true" ]; then
            src="mosaic-cli/target/universal-apple-darwin/release/mosaic-cli"
            ext=""
          elif [[ "${{ matrix.os }}" == windows* ]]; then
            src="mosaic-cli/target/${{ matrix.cli-target }}/release/mosaic-cli.exe"
            ext=".exe"
          else
            src="mosaic-cli/target/${{ matrix.cli-target }}/release/mosaic-cli"
            ext=""
          fi
          dst="mosaic-cli-${{ matrix.cli-name }}${ext}"
          cp "$src" "$dst"
          echo "CLI_ARTIFACT=$dst" >> "$GITHUB_ENV"

      - name: Checksum CLI artifact
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            sha=$(certutil -hashfile "$CLI_ARTIFACT" SHA256 | sed -n '2p' | tr -d ' \r' | tr 'A-Z' 'a-z')
            printf '%s  %s\n' "$sha" "$CLI_ARTIFACT" > "${CLI_ARTIFACT}.sha256"
          else
            shasum -a 256 "$CLI_ARTIFACT" > "${CLI_ARTIFACT}.sha256"
          fi
          cat "${CLI_ARTIFACT}.sha256"

      - name: Upload CLI to release draft
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.CLI_ARTIFACT }}
            ${{ env.CLI_ARTIFACT }}.sha256
          tag_name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: true

  finalize:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download per-artifact checksums from draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p checksums
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'mosaic-cli-*.sha256' \
            --dir checksums
          sort checksums/*.sha256 > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Upload SHA256SUMS to draft release
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS
          tag_name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: true
