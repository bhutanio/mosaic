name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: ""
          - os: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-release-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-release-${{ matrix.os }}-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mosaic ${{ github.ref_name }}"
          releaseBody: |
            ## What's New

            Initial release of Mosaic — a cross-platform desktop app for generating video contact sheets, screenshots, animated preview reels, and animated contact sheets.

            ### Features

            - Contact sheet generation with configurable grid, timestamps, header, and themes (PNG/JPEG)
            - Individual screenshot extraction at evenly-spaced timestamps (PNG/JPEG)
            - Animated preview reels stitched from short video clips (WebP/WebM/GIF)
            - Animated contact sheets with grid of animated clips (WebP)
            - Drag-and-drop batch queue with per-file progress and cancel support
            - Dark/light theme following system preference
            - Configurable output quality, fonts, suffixes, and output location
            - Frame-accurate seeking with parallel extraction

            ### Requirements

            **[ffmpeg](https://ffmpeg.org/) must be installed separately.** The app checks for `ffmpeg` and `ffprobe` on your PATH at startup.

            ### Notes

            Builds are **unsigned**. macOS users: right-click → Open to bypass Gatekeeper. Windows users: click through the SmartScreen warning.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}
